<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1">

  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" type="text/css" href="/css/common-style.css">
  <link rel="stylesheet" href="../css/charts_style.css">
  <link rel="stylesheet" type="text/css" href="../css/calculator-style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" ></script>
  <script  th:unless="${isPaidAccount}" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4680762769337689" crossorigin="anonymous"></script>
  <script src="/js/common.js"></script>
  
  <title>Reference tables</title>
</head>
<body>

<div th:replace="~{fragments/navbar :: my_fragment(active='calculator')}"></div>
<div class="clearFloat"></div>

<div id="content">



<div class="container my-5" style="max-width: 800px;">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Multiple Expansion & Contraction CAGR Calculator</h4>
            </div>
            <div class="card-body">
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label for="currentMultiple" class="form-label">Current Multiple</label>
                        <input type="number" step="0.1" class="form-control" id="currentMultiple" value="18">
                    </div>
                    <div class="col-md-4">
                        <label for="growthRate" class="form-label">Growth Rate %</label>
                        <input type="number" step="0.1" class="form-control" id="growthRate" value="7">
                    </div>
                    <div class="col-md-4">
                        <label for="years" class="form-label">Years</label>
                        <input type="number" step="1" class="form-control" id="years" value="10">
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Scenario</th>
                                <th class="text-end">End Multiple</th>
                                <th class="text-end">Calculated CAGR %</th>
                                <th class="text-end">Total Return</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const currentMultipleInput = document.getElementById('currentMultiple');
        const growthRateInput = document.getElementById('growthRate');
        const yearsInput = document.getElementById('years');
        const resultsBody = document.getElementById('resultsBody');

        function calculateCagr() {
            const currentMultiple = parseFloat(currentMultipleInput.value);
            const growthRate = parseFloat(growthRateInput.value) / 100;
            const years = parseFloat(yearsInput.value);

            if (isNaN(currentMultiple) || isNaN(growthRate) || isNaN(years) || currentMultiple <= 0 || years <= 0) {
                resultsBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Please enter valid positive numbers.</td></tr>';
                return;
            }

            const baseScenarios = [
                { label: "Same as input", formula: () => currentMultiple },
                { label: "Half of input", formula: () => currentMultiple * 0.5 },
                { label: "Double of input", formula: () => currentMultiple * 2 },
                { label: "Same as growth", formula: () => parseFloat(growthRateInput.value) },
                { label: "Input - 20%", formula: () => currentMultiple * 0.8 },
                { label: "Growth - 20%", formula: () => parseFloat(growthRateInput.value) * 0.8 },
                { label: "Growth + 20%", formula: () => parseFloat(growthRateInput.value) * 1.2 },
                { label: "Growth + 50%", formula: () => parseFloat(growthRateInput.value) * 1.5 }
            ];

            let rowsHtml = '';
            const terminalValueFactor = Math.pow(1 + growthRate, years);

            baseScenarios.forEach(scenario => {
                const targetEndMultiple = scenario.formula();
                
                if (targetEndMultiple < 0) return;

                const priceMultipleRatio = targetEndMultiple / currentMultiple;
                const totalReturnFactor = terminalValueFactor * priceMultipleRatio;
                const cagr = (Math.pow(totalReturnFactor, 1 / years) - 1) * 100;

                rowsHtml += `
                    <tr>
                        <td>${scenario.label}</td>
                        <td class="text-end fw-semibold">${targetEndMultiple.toFixed(2)}</td>
                        <td class="text-end fw-bold ${cagr >= 0 ? 'text-success' : 'text-danger'}">${cagr.toFixed(2)}%</td>
                        <td class="text-end fw-semibold text-secondary">${totalReturnFactor.toFixed(2)}x</td>
                    </tr>
                `;
            });

            resultsBody.innerHTML = rowsHtml;
        }

        [currentMultipleInput, growthRateInput, yearsInput].forEach(input => {
            input.addEventListener('input', calculateCagr);
        });

        calculateCagr();
    </script>




<script src="../js/calculator.js"></script>

<script src="../js/autocomplete.js"></script>

</div>

<div th:replace="~{fragments/jwt-refresher :: jwt_refresher}"></div>
<span id="allowed" style="display:none" th:text="${allowed}"></span>
<span id="accountType" style="display:none" th:text="${accountType}"></span>
<span id="viewLimit" style="display:none" th:text="${viewLimit}"></span>
<div th:replace="~{fragments/content-blocking-modal}"></div>
<div th:replace="~{fragments/general-message-modal}"></div>

</body>
</html>
